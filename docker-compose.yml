services:
  # 1. Our Nginx Frontend (New!)
  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

  # 2. Our PHP API Service
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=task_user
      - DB_PASS=supersecretpassword
      - DB_NAME=taskmaster
    depends_on:
      - db

  # 3. Our MySQL Database Service
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=taskmaster
      - MYSQL_USER=task_user
      - MYSQL_PASSWORD=supersecretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

# Persistent Storage for the DB
volumes:
  db_data:
