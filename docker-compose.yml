services:
  # The Frontend Web Server
  web:
    build: ./frontend
    image: ahsanali250/taskmaster-web:latest
    ports:
      - "8081:80" # <--- SHIFTED TO PORT 8081
    depends_on:
      - api
    networks:
      - taskmaster-net

  # The PHP API Backend
  api:
    build: .
    image: ahsanali250/taskmaster-api:latest
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=task_user
      - DB_PASS=supersecretpassword
      - DB_NAME=taskmaster
    depends_on:
      - db
    networks:
      - taskmaster-net

  # The MySQL Database
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=taskmaster
      - MYSQL_USER=task_user
      - MYSQL_PASSWORD=supersecretpassword
    # We removed ports 3306:3306 to prevent host conflicts
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - taskmaster-net

networks:
  taskmaster-net:
    driver: bridge

volumes:
  db_data: